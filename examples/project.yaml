project_name: ExampleProject

sources:
  roots:
    - src/
  include:
    - "**/*.py"
    - "**/*.java"
    - "**/*.c"
    - "**/*.cc"
    - "**/*.cpp"
    - "**/*.h"
    - "**/*.hpp"
    - "**/*.js"
    - "**/*.mjs"
    - "**/*.cjs"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.go"
    - "**/*.rs"
    - "**/*.cs"
  exclude:
    - "**/tests/**"

sdd_template: ../templates/sdd_default.yaml

llm:
  provider: mock
  model_name: mock-sddraft
  temperature: 0.2

generation:
  max_files: 500
  code_chunk_lines: 40
  retrieval_top_k: 6
  write_batch_size: 200
  max_in_memory_records: 2000
  index_shard_size: 1000

output_dir: ../artifacts
